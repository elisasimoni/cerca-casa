name: Aggiorna annunci

on:
  schedule:
    # 3 volte al giorno (UTC): 06:23, 12:23, 18:23 ora italiana estiva
    - cron: "23 4,10,16 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aggiorna-annunci
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Esegui scraper
        run: python3 scraper/scrape.py

      - name: Commit dati se cambiati
        run: |
          if git diff --quiet data/annunci.json 2>/dev/null && [ -f data/annunci.json ]; then
            echo "Nessun cambiamento"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/annunci.json
            git commit -m "Aggiorna annunci ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
